<!DOCTYPE html>
<html lang="ca">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Cat lingo emoji</title>
<meta name="description" content="Aprèn català amb emojis">
<meta name="theme-color" content="#4CAF50">

<!-- PWA -->
<link rel="manifest" href="./manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<link rel="apple-touch-icon" href="/icon-192.png">
<link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png">
<link rel="icon" type="image/png" sizes="512x512" href="/icon-512.png">

<link rel="stylesheet" href="./styles.css">
</head>
<body>

<header>
  <h1 id="app-titol">Cat lingo emoji</h1>
  <div class="coins">🪙 <span id="monedes">0</span> <span id="text-monedes">Monedes</span></div>
</header>

<div class="container">

  <!-- MAPA -->
  <div id="tab-mapa" class="tab-content active">
    <div id="mapa"></div>
  </div>

  <!-- MISSIÓ -->
  <div id="tab-missio" class="tab-content">
    <div id="missio-contenidor"></div>
  </div>

  <!-- GREMI -->
  <div id="tab-gremi" class="tab-content">
    <div class="sub-tabs">
      <button class="sub-tab-btn active" onclick="mostrarGremi('personatges', event)">Personatges</button>
      <button class="sub-tab-btn" onclick="mostrarGremi('biblioteca', event)">Biblioteca</button>
    </div>
    <div id="gremi-contenidor"></div>
  </div>

  <!-- LECTURA -->
  <div id="tab-lectura" class="tab-content">
    <div id="lectura-contenidor"></div>
  </div>

  <!-- TIPS -->
  <div id="tab-tips" class="tab-content">
    <div id="tips-contenidor"></div>
  </div>

  <!-- BOTIGA -->
  <div id="tab-botiga" class="tab-content">
    <h2 id="text-botiga" style="margin-bottom: 20px;">🛒 Botiga</h2>
    <div id="botiga-contenidor" class="capitol-grid">Carregant botiga...</div>
  </div>

</div>

<nav class="bottom-nav">
  <div class="nav-item active" onclick="canviarTab('mapa', event)">
    <span class="nav-icon">🗺️</span>
    <span id="tab-mapa-txt">Món</span>
  </div>
  <div class="nav-item" onclick="canviarTab('missio', event)">
    <span class="nav-icon">📝</span>
    <span id="tab-missio-txt">Missió</span>
  </div>
  <div class="nav-item" onclick="canviarTab('gremi', event)">
    <span class="nav-icon">🏛️</span>
    <span id="tab-gremi-txt">Gremi</span>
  </div>
  <div class="nav-item" onclick="canviarTab('lectura', event)">
    <span class="nav-icon">📖</span>
    <span id="tab-lectura-txt">Lectura</span>
  </div>
  <div class="nav-item" onclick="canviarTab('tips', event)">
    <span class="nav-icon">💡</span>
    <span id="tab-tips-txt">Tips</span>
  </div>
  <div class="nav-item" onclick="canviarTab('botiga', event)">
    <span class="nav-icon">🛒</span>
    <span id="tab-botiga-txt">Botiga</span>
  </div>
</nav>

<div id="modal" class="modal hidden">
  <div class="modal-content">
    <p id="modalText"></p>
    <button class="btn" onclick="tancarModal()">OK</button>
  </div>
</div>

<script>
function vibrar() {
  if (navigator.vibrate) navigator.vibrate(20);
}

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js')
   .then(reg => console.log('SW registrat:', reg.scope))
   .catch(err => console.log('SW error:', err));
  });
}
</script>

<script src="./main.js"></script>

</body>
</html>
